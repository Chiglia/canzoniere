<section
  class="no-print w-full md:w-80 lg:w-96 bg-white border-r border-stone-200/80 flex flex-col flex-shrink-0 h-full"
>
  <!-- Search & Quick Import/Export -->
  <div class="p-4 border-b border-stone-200/60 bg-stone-50/50 space-y-3">
    <!-- Create song button -->
    <button
      (click)="service.createNewSong()"
      class="w-full bg-rose-700 hover:bg-rose-800 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition-colors cursor-pointer shadow-sm inline-flex items-center justify-center gap-2"
    >
      <i class="pi pi-plus"></i>
      {{ 'app.add_song' | transloco }}
    </button>

    <!-- Search input -->
    <div class="relative">
      <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-xs"></i>
      <input
        type="text"
        [(ngModel)]="service.searchQuery"
        [placeholder]="'app.search' | transloco"
        class="w-full pl-9 pr-4 py-1.5 bg-stone-100/80 border border-stone-200 rounded-lg text-sm text-stone-800 placeholder-stone-400 focus:outline-hidden focus:border-rose-500/50 focus:bg-white transition-all"
      />
    </div>

    <!-- Import/Export bar -->
    <div class="grid grid-cols-2 gap-2 text-xs">
      <button
        (click)="service.exportSongbook()"
        class="border border-stone-200 hover:bg-stone-100 text-stone-600 py-1.5 px-2 rounded-md font-medium transition-colors cursor-pointer inline-flex items-center justify-center gap-1"
      >
        <i class="pi pi-download"></i>
        {{ 'app.export_json' | transloco }}
      </button>
      <button
        (click)="service.triggerImportClick()"
        class="border border-stone-200 hover:bg-stone-100 text-stone-600 py-1.5 px-2 rounded-md font-medium transition-colors cursor-pointer inline-flex items-center justify-center gap-1"
      >
        <i class="pi pi-upload"></i>
        {{ 'app.import_json' | transloco }}
      </button>
      <input
        type="file"
        id="json-import-file"
        (change)="service.importSongbook($event)"
        accept=".json"
        class="hidden"
      />
    </div>
  </div>

  <!-- Song list -->
  <div class="flex-1 overflow-y-auto p-4 space-y-2 max-h-[calc(100vh-270px)]">
    <div
      *ngIf="service.filteredSongs.length === 0"
      class="text-center py-8 px-4 text-stone-400 space-y-3"
    >
      <i class="pi pi-folder-open text-3xl"></i>
      <p class="text-sm font-medium">{{ 'app.no_songs' | transloco }}</p>
      <button
        (click)="service.resetToSamples()"
        class="text-xs text-rose-700 hover:underline font-semibold cursor-pointer"
      >
        {{ 'app.sample_data' | transloco }}
      </button>
    </div>

    <!-- Song Card Loop -->
    <div
      *ngFor="let song of service.filteredSongs; let i = index"
      [class.border-rose-700]="song.id === service.activeSongId"
      [class.bg-rose-50/20]="song.id === service.activeSongId"
      [class.shadow-xs]="song.id === service.activeSongId"
      (click)="service.selectSong(song.id)"
      class="group p-3 border border-stone-200/80 hover:border-stone-400 rounded-lg cursor-pointer transition-all flex items-center justify-between gap-2 relative bg-white"
    >
      <div class="flex-1 min-w-0 pr-1">
        <div class="flex items-center gap-1.5 mb-1">
          <span
            class="text-[10px] uppercase tracking-wider bg-stone-100 group-hover:bg-stone-200/60 font-semibold px-1.5 py-0.5 rounded text-stone-500"
          >
            {{ song.category }}
          </span>
          <span class="text-[10px] text-stone-400 font-mono"> #{{ i + 1 }} </span>
        </div>
        <h3
          class="font-bold text-sm text-stone-900 group-hover:text-rose-800 truncate transition-colors"
        >
          {{ song.title }}
        </h3>
        <p class="text-xs text-stone-500 italic truncate">{{ song.artist }}</p>
      </div>

      <!-- Ordering and management buttons -->
      <div class="flex items-center gap-0.5 opacity-60 group-hover:opacity-100 transition-opacity">
        <button
          (click)="service.moveSongUp(i, $event)"
          [disabled]="i === 0"
          [class.text-stone-300]="i === 0"
          class="p-1 hover:bg-stone-100 text-stone-500 rounded cursor-pointer disabled:cursor-not-allowed"
        >
          <i class="pi pi-chevron-up text-[10px]"></i>
        </button>
        <button
          (click)="service.moveSongDown(i, $event)"
          [disabled]="i === service.songs.length - 1"
          [class.text-stone-300]="i === service.songs.length - 1"
          class="p-1 hover:bg-stone-100 text-stone-500 rounded cursor-pointer disabled:cursor-not-allowed"
        >
          <i class="pi pi-chevron-down text-[10px]"></i>
        </button>
        <button
          (click)="$event.stopPropagation(); service.deleteSong(song.id)"
          class="p-1 hover:bg-rose-100 text-rose-600 rounded cursor-pointer"
        >
          <i class="pi pi-trash text-[11px]"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Info Tip Footer -->
  <div
    class="p-3 bg-stone-50/50 border-t border-stone-100 text-[11px] text-stone-500 italic flex items-start gap-2 mt-auto"
  >
    <i class="pi pi-info-circle text-rose-700/80 mt-0.5"></i>
    <span>{{ 'app.info_tip' | transloco }}</span>
  </div>
</section>
