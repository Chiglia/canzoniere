<div class="max-w-3xl w-full mx-auto">
  <!-- Active Song Paper Container -->
  <div
    class="bg-white border border-stone-200/80 rounded-2xl shadow-md p-6 md:p-8 lg:p-10 relative overflow-hidden bg-[radial-gradient(#e5e5e5_1px,transparent_1px)] [background-size:16px_16px]"
  >
    <!-- Decorative binder holes for book notebook look -->
    <div
      class="absolute left-3 top-0 bottom-0 flex flex-col justify-around py-8 pointer-events-none opacity-20"
    >
      <div
        *ngFor="let h of [1, 2, 3, 4, 5, 6]"
        class="w-3.5 h-3.5 rounded-full bg-stone-800 border-2 border-stone-900"
      ></div>
    </div>

    <!-- Content indentation for notebook holes -->
    <div class="pl-6 md:pl-8 space-y-6">
      <!-- Song Header -->
      <div class="border-b-2 border-stone-100 pb-4">
        <span
          class="text-[10px] uppercase font-bold tracking-widest text-rose-700 bg-rose-50 px-2.5 py-1 rounded-md"
        >
          {{ service.editForm.category || 'Generico' }}
        </span>
        <h2 class="text-3xl font-serif font-black text-stone-900 mt-2 mb-1">
          {{ service.editForm.title || 'Senza Titolo' }}
        </h2>
        <p class="text-stone-500 italic text-sm">
          {{ service.editForm.artist || 'Sconosciuto' }}
        </p>
      </div>

      <!-- Main ChordPro lyrics rendering block -->
      <div class="space-y-0.5 leading-relaxed overflow-x-auto select-text font-serif">
        <div
          *ngFor="let line of service.getParsedLines(service.editForm.content)"
          class="flex flex-wrap items-end"
          [ngClass]="service.hasChords(line) ? 'pt-6 pb-1' : 'py-1'"
        >
          <div *ngFor="let segment of line" class="relative flex flex-col justify-end">
            <span
              *ngIf="segment.chord"
              class="absolute top-0 left-0 text-xs font-bold font-mono text-rose-700 tracking-wider select-none transform -translate-y-4"
            >
              {{ segment.chord }}
            </span>
            <span class="text-stone-800 whitespace-pre text-[15px] md:text-base font-medium">{{
              segment.text
            }}</span>
          </div>
        </div>
      </div>

      <!-- Notebook page footer -->
      <div
        class="border-t border-stone-100 pt-4 flex items-center justify-between text-xs text-stone-400"
      >
        <span>Canzoniere Creativo</span>
        <span> {{ 'app.page_number' | transloco }} {{ songPageIndex }} </span>
      </div>
    </div>
  </div>
</div>
